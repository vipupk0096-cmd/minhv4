<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CÔNG CỤ GIÁ - TỐI ƯU MOBILE</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --dark: #2d3436; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; margin: 0; padding: 10px; color: var(--dark); }
        .container { max-width: 100%; margin: auto; }
        .controls { 
            background: white; padding: 15px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            position: sticky; top: 5px; z-index: 1000;
            border: 1px solid #e1e4e8; margin-bottom: 20px;
        }
        .grid-settings { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-settings > div { flex: 1; }
        .full-width { grid-column: 1 / -1; }
        
        label { font-weight: 700; font-size: 0.75rem; color: #2d3436; display: block; margin-bottom: 6px; text-transform: uppercase; border-left: 3px solid var(--success); padding-left: 5px;}
        input[type="text"], input[type="number"], select, button, textarea { 
            width: 100%; padding: 10px; border: 1px solid #ced4da; 
            border-radius: 6px; font-size: 0.95rem; box-sizing: border-box; 
            -webkit-appearance: none; font-family: inherit;
        }
        textarea { resize: vertical; min-height: 60px; }
        
        #giaViet { color: #d63031; border: 1px dashed #d63031; background: #fff5f5; font-weight: bold; }
        
        .radio-group { display: flex; gap: 15px; align-items: center; padding: 5px 0; }
        .radio-group label { border-left: none; text-transform: none; font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 5px; cursor: pointer; margin: 0;}
        .radio-group input[type="radio"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary); }
        .radio-group input[type="number"] { width: 60px; padding: 6px; text-align: center; font-weight: bold; }

        .header-with-btn { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .header-with-btn label { margin-bottom: 0; }
        .btn-copy { background: var(--primary); color: white; border: none; padding: 4px 12px; border-radius: 4px; font-size: 0.75rem; cursor: pointer; font-weight: bold; width: auto;}

        .action-buttons { display: flex; gap: 10px; margin-top: 5px; grid-column: 1 / -1; }
        .action-buttons button { color: white; font-weight: bold; border: none; cursor: pointer; font-size: 0.95rem; padding: 12px; border-radius: 8px; }
        #downloadBtn { background: #636e72; flex: 1; }
        #shareBtn { background: var(--success); flex: 1.5; }
        #downloadBtn:disabled, #shareBtn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .preview-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 600px) { .preview-grid { grid-template-columns: 1fr 1fr; } }
        .preview-item { background: white; padding: 8px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); text-align: center; }
        canvas { width: 100%; height: auto; border-radius: 4px; display: block; }
        .status { text-align: center; margin-top: 10px; font-weight: bold; color: var(--primary); font-size: 0.9rem; grid-column: 1 / -1; }
        input[type="range"] { height: 30px; padding: 0; }
        input[type="color"] { padding: 2px; height: 40px; }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <div class="grid-settings">
            
            <div class="full-width">
                <label>1. Chọn ảnh</label>
                <input type="file" id="upload" accept="image/*" multiple>
            </div>
            <div>
                <label>Nhà cung cấp</label>
                <select id="supplier">
                    <option value="1A801">lan tùng (1A801)</option>
                    <option value="1A802">khải kiệt (1A802)</option>
                    <option value="1A803">alan (1A803)</option>
                    <option value="1A804">a chu (1A804)</option>
                    <option value="1A805">a sần (1A805)</option>
                    <option value="1A806">a minh (1A806)</option>
                    <option value="1A807">a tang (1A807)</option>
                    <option value="1A808">a tâu (1A808)</option>
                    <option value="1A809">a lý (1A809)</option>
                    <option value="1A810">a hồng (1A810)</option>
                    <option value="1A811">a sinh (1A811)</option>
                    <option value="1A812">a long (1A812)</option>
                    <option value="1A813">sanly (1A813)</option>
                    <option value="1A814">sinh ủng (1A814)</option>
                    <option value="1A815">mây già (1A815)</option>
                    <option value="1A816">a ly (1A816)</option>
                    <option value="1A817">a chung (1A817)</option>
                    <option value="1A818">a bình (1A818)</option>
                    <option value="1A819">seo hoàng (1A819)</option>
                    <option value="1A820">a linh (1A820)</option>
                    <option value="1A821">mongmanh (1A821)</option>
                    <option value="1A822">a chân (1A822)</option>
                    <option value="1A823">seo hoàng già (1A823)</option>
                    <option value="1A824">a hỷ (1A824)</option>
                    <option value="1A825">a vũ (1A825)</option>
                    <option value="1A826">hoa túi (1A826)</option>
                    <option value="1A827">a văn - a hoa (1A827)</option>
                    <option value="1A828">mây trẻ (1A828)</option>
                    <option value="1A829">khải béo (1A829)</option>
                    <option value="1A830">a sinh nam (1A830)</option>
                </select>
            </div>
            <div>
                <label>Vị trí</label>
                <select id="textPos">
                    <option value="top-left">Trái - Trên</option>
                    <option value="top-right">Phải - Trên</option>
                    <option value="bottom-left">Trái - Dưới</option>
                    <option value="bottom-right" selected>Phải - Dưới</option>
                </select>
            </div>

            <div class="full-width">
                <label>2. Mã ghi đè (VD: 27-31—29D)</label>
                <textarea id="overrideName" rows="3" placeholder="Nhập mã gốc tại đây... (bỏ trống dùng tên file ảnh)"></textarea>
            </div>

            <div class="full-width">
                <div class="header-with-btn">
                    <label>3. Giá Việt & Chữ trên ảnh</label>
                    <button class="btn-copy" id="copyBtn">COPY</button>
                </div>
                <textarea id="giaViet" readonly rows="3" placeholder="Kết quả sẽ hiển thị ở đây..."></textarea>
            </div>

            <div>
                <label>Cỡ chữ</label>
                <input type="range" id="textSize" min="1" max="25" value="8">
            </div>
            <div>
                <label>Màu</label>
                <input type="color" id="textColor" value="#ffffff">
            </div>

            <div>
                <label>Giá Trung</label>
                <input type="number" id="giaTrung" value="3.9" step="0.1">
            </div>
            <div>
                <label>Phí Thêm</label>
                <input type="number" id="extraPrice" value="0">
            </div>

            <div class="full-width radio-group">
                <label>
                    <input type="radio" name="ageGroup" value="L" checked> 
                    Người lớn (+)
                    <input type="number" id="giaNguoiLon" value="17">
                </label>
                <label>
                    <input type="radio" name="ageGroup" value="B"> 
                    Trẻ con (+)
                    <input type="number" id="giaTreEm" value="15">
                </label>
            </div>

            <div class="action-buttons">
                <button id="downloadBtn">TẢI MÁY</button>
                <button id="shareBtn">CHIA SẺ ẢNH</button>
            </div>
            <div id="status" class="status">Sẵn sàng</div>
        </div>
    </div>
    <div id="previewGrid" class="preview-grid"></div>
</div>

<script>
    const $ = id => document.getElementById(id);
    const upload = $('upload'), previewGrid = $('previewGrid'), status = $('status'), downloadBtn = $('downloadBtn'), shareBtn = $('shareBtn');
    const configIds = ['supplier', 'textColor', 'textSize', 'textPos', 'giaTrung', 'extraPrice', 'overrideName', 'giaNguoiLon', 'giaTreEm'];
    let fileData = [];

    // Nút Copy
    $('copyBtn').onclick = () => {
        const textToCopy = $('giaViet').value;
        if (!textToCopy) return;
        navigator.clipboard.writeText(textToCopy).then(() => {
            const btn = $('copyBtn');
            btn.innerText = "ĐÃ COPY!";
            btn.style.backgroundColor = "var(--success)";
            setTimeout(() => {
                btn.innerText = "COPY";
                btn.style.backgroundColor = "var(--primary)";
            }, 2000);
        });
    };

    function getConfig() {
        return {
            supplier: $('supplier').value,
            color: $('textColor').value,
            sizeRatio: $('textSize').value / 100,
            pos: $('textPos').value,
            giaTrung: parseFloat($('giaTrung').value) || 0,
            giaNguoiLon: parseFloat($('giaNguoiLon').value) || 0,
            giaTreEm: parseFloat($('giaTreEm').value) || 0,
            extraPrice: parseFloat($('extraPrice').value) || 0,
            overrideName: $('overrideName').value.trim(),
            ageGroup: document.querySelector('input[name="ageGroup"]:checked').value
        };
    }

    // Tính giá chung
    function calculatePrices(text, config, returnType = 'formatted') {
        if (!text) return returnType === 'array' ? [] : "";
        const lines = text.split('\n');
        const pricesArray = [];
        
        const processedLines = lines.map(line => {
            const regex = /(\d+)(?:\s*(?:d|¥|tệ))?\s*$/i;
            if (regex.test(line)) {
                return line.replace(regex, (match, p1) => {
                    const priceCNY = parseFloat(p1);
                    const base = priceCNY * config.giaTrung;
                    const fee = config.ageGroup === 'L' ? config.giaNguoiLon : config.giaTreEm;
                    const finalPrice = Math.round(base + fee + config.extraPrice);
                    pricesArray.push(finalPrice);
                    return `${finalPrice}k`; 
                });
            }
            return line; 
        });

        return returnType === 'array' ? pricesArray : processedLines.join('\n');
    }

    function updateGiaVietPreview() {
        const config = getConfig();
        if (config.overrideName) {
            $('giaViet').value = calculatePrices(config.overrideName, config, 'formatted');
        } else if (fileData.length > 0) {
            const fileName = fileData[0].name.replace(/\.[^/.]+$/, "");
            $('giaViet').value = calculatePrices(fileName, config, 'formatted');
        } else {
            $('giaViet').value = "";
        }
    }

    // Render ảnh
    async function render(index, canvas) {
        const file = fileData[index];
        const img = await loadImage(file);
        const config = getConfig();

        let sourceText = config.overrideName || file.name.replace(/\.[^/.]+$/, "");
        
        // Cấu trúc text in lên ảnh: Mã ncc + ht + giá1/giá2
        const extractedPrices = calculatePrices(sourceText, config, 'array');
        let displayText = `${config.supplier}ht`;
        if (extractedPrices.length > 0) {
            displayText += extractedPrices.join('/');
        }

        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);

        const fontSize = Math.floor(img.width * config.sizeRatio);
        ctx.font = `bold ${fontSize}px sans-serif`;
        ctx.fillStyle = config.color;
        ctx.shadowColor = "rgba(0,0,0,0.8)";
        ctx.shadowBlur = fontSize / 4;

        const margin = fontSize * 0.8;
        const metrics = ctx.measureText(displayText);
        
        let x = margin;
        let y = margin + fontSize;

        // Xử lý 4 vị trí góc
        switch (config.pos) {
            case 'top-left':
                x = margin;
                y = margin + fontSize;
                break;
            case 'top-right':
                x = img.width - metrics.width - margin;
                y = margin + fontSize;
                break;
            case 'bottom-left':
                x = margin;
                y = img.height - margin;
                break;
            case 'bottom-right':
                x = img.width - metrics.width - margin;
                y = img.height - margin;
                break;
        }

        ctx.fillText(displayText, x, y);
        return displayText.replace(/\//g, '-');
    }

    // Upload & Events
    upload.onchange = async (e) => {
        fileData = Array.from(e.target.files);
        previewGrid.innerHTML = "";
        updateGiaVietPreview();
        for (let i = 0; i < fileData.length; i++) {
            const card = document.createElement('div');
            card.className = 'preview-item';
            card.innerHTML = `<canvas></canvas>`;
            previewGrid.appendChild(card);
            await render(i, card.querySelector('canvas'));
        }
        status.innerText = `Đã tải ${fileData.length} ảnh`;
    };

    const reRenderAll = async () => {
        updateGiaVietPreview();
        const items = document.querySelectorAll('.preview-item');
        for (let i = 0; i < items.length; i++) {
            await render(i, items[i].querySelector('canvas'));
        }
    };
    
    configIds.forEach(id => $(id).addEventListener('input', reRenderAll));
    document.querySelectorAll('input[name="ageGroup"]').forEach(radio => {
        radio.addEventListener('change', reRenderAll);
    });

    // Actions
    downloadBtn.onclick = async () => {
        if (!fileData.length) return;
        downloadBtn.disabled = true; shareBtn.disabled = true;
        for (let i = 0; i < fileData.length; i++) {
            status.innerText = `Đang lưu: ${i + 1}/${fileData.length}`;
            const hiddenCanvas = document.createElement('canvas');
            const saveName = await render(i, hiddenCanvas);
            const link = document.createElement('a');
            link.download = `[SP]_${saveName}.jpg`;
            link.href = hiddenCanvas.toDataURL('image/jpeg', 0.9);
            link.click();
            await new Promise(r => setTimeout(r, 300));
        }
        status.innerText = "✅ Lưu máy thành công!";
        downloadBtn.disabled = false; shareBtn.disabled = false;
    };

    shareBtn.onclick = async () => {
        if (!fileData.length) return;
        if (!navigator.canShare) {
            alert("Trình duyệt không hỗ trợ chia sẻ trực tiếp."); return;
        }
        downloadBtn.disabled = true; shareBtn.disabled = true;
        status.innerText = "Đang chuẩn bị ảnh để chia sẻ...";
        try {
            const filesToShare = [];
            const shareTitle = $('giaViet').value.replace(/\n/g, ' | '); 
            for (let i = 0; i < fileData.length; i++) {
                const hiddenCanvas = document.createElement('canvas');
                const saveName = await render(i, hiddenCanvas);
                const blob = await new Promise(r => hiddenCanvas.toBlob(r, 'image/jpeg', 0.9));
                filesToShare.push(new File([blob], `${saveName}.jpg`, { type: 'image/jpeg' }));
            }
            await navigator.share({ files: filesToShare, title: shareTitle, text: shareTitle });
            status.innerText = "✅ Mở chia sẻ thành công!";
        } catch (error) {
            status.innerText = "Hủy chia sẻ hoặc có lỗi.";
        }
        downloadBtn.disabled = false; shareBtn.disabled = false;
    };

    function loadImage(file) {
        return new Promise(res => {
            const url = URL.createObjectURL(file);
            const img = new Image();
            img.onload = () => { URL.revokeObjectURL(url); res(img); };
            img.src = url;
        });
    }
</script>
</body>
</html>
